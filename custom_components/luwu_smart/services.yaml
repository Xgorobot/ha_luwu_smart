send_command:
  name: Send Command
  description: Send a custom command to the Luwu Smart device.
  fields:
    device_id:
      name: Device ID
      description: The device ID to send the command to. If not specified, sends to the first device.
      required: false
      example: "puppy_xxxx"
      selector:
        text:
    command:
      name: Command
      description: The command to send (move, action, emotion, laser).
      required: true
      example: "action"
      selector:
        select:
          options:
            - "move"
            - "action"
            - "emotion"
            - "laser"
    parameters:
      name: Parameters
      description: Command parameters as a JSON object.
      required: false
      example: '{"action": "Wave"}'
      selector:
        object:

execute_action:
  name: Execute Action
  description: Execute a predefined action on the robot.
  fields:
    device_id:
      name: Device ID
      description: The device ID to control.
      required: false
      selector:
        text:
    action:
      name: Action
      description: The action to execute.
      required: true
      example: "Wave"
      selector:
        select:
          options:
            - "Wave"
            - "Sit"
            - "Stretch"
            - "Naughty"
            - "Swing"
            - "Lookup"
            - "Rolling"
            - "Angry"
            - "Swimming"
            - "Pee"
            - "Bouncing"
            - "Shaking"
            - "Stop"

set_emotion:
  name: Set Emotion
  description: Set the robot's emotion/expression.
  fields:
    device_id:
      name: Device ID
      description: The device ID to control.
      required: false
      selector:
        text:
    emotion:
      name: Emotion
      description: The emotion to display.
      required: true
      example: "happy"
      selector:
        select:
          options:
            - "neutral"
            - "happy"
            - "sad"
            - "angry"
            - "surprised"
            - "sleepy"
            - "excited"
            - "confused"

move_robot:
  name: Move Robot
  description: Control the robot movement.
  fields:
    device_id:
      name: Device ID
      description: The device ID to control.
      required: false
      selector:
        text:
    vx:
      name: Forward Speed (vx)
      description: Forward/backward speed (-100 to 100). Positive is forward.
      required: false
      default: 0
      selector:
        number:
          min: -100
          max: 100
          step: 10
    vyaw:
      name: Turn Speed (vyaw)
      description: Turn speed (-100 to 100). Positive is left turn.
      required: false
      default: 0
      selector:
        number:
          min: -100
          max: 100
          step: 10
    time:
      name: Duration
      description: Movement duration in milliseconds.
      required: false
      default: 500
      selector:
        number:
          min: 100
          max: 5000
          step: 100
          unit_of_measurement: ms
